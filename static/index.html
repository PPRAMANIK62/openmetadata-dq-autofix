<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQ AutoFix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="logo">DQ AUTOFIX</h1>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Failures Panel -->
            <section class="panel failures-panel">
                <div class="panel-header">
                    <div class="panel-header-left">
                        <h2 class="panel-title">FAILURES</h2>
                        <span class="panel-stats">
                            <span id="stat-failures">-</span> total
                            <span class="stat-separator">•</span>
                            <span id="stat-fixable">-</span> fixable
                            <span class="stat-separator">•</span>
                            <span id="stat-ready">-</span> ready
                        </span>
                    </div>
                    <button class="btn-icon" id="refresh-btn" aria-label="Refresh data" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 8a6 6 0 0 1 6-6c2.5 0 4.5 1.5 5.5 3.5M14 8a6 6 0 0 1-6 6c-2.5 0-4.5-1.5-5.5-3.5"/>
                            <path d="M14 2v4h-4M2 14v-4h4"/>
                        </svg>
                    </button>
                </div>
                <div class="failures-list" id="failures-list">
                    <div class="loading-state">Loading failures...</div>
                </div>
            </section>

            <!-- Resizable Divider -->
            <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Resize panels"></div>

            <!-- Diagnosis Panel -->
            <section class="panel diagnosis-panel" id="diagnosis-panel">
                <div class="panel-header">
                    <h2 class="panel-title">DIAGNOSIS</h2>
                </div>
                <div class="diagnosis-content" id="diagnosis-content">
                    <div class="empty-state">
                        <p>Select a failure to view diagnosis</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast for copy feedback -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="/static/app.js"></script>
</body>
</html>
